name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pmn
          POSTGRES_PASSWORD: pmn
          POSTGRES_DB: pmn
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U pmn" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://pmn:pmn@localhost:5432/pmn
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Apply migrations to a fresh DB
        run: pnpm db:migrate

      - name: Fail if schema has uncommitted drift
        run: |
          pnpm db:generate
          if [ -n "$(git status --porcelain packages/db/drizzle)" ]; then
            echo "::error::Schema changed but migration was not committed. Run pnpm db:generate."
            git status --porcelain packages/db/drizzle
            exit 1
          fi
